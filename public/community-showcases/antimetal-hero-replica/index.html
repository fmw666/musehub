<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'self'"
    />
    <title>Antimetal Hero — 1:1 Replica</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="hero">
      <div class="hero-dotted-video" id="hero-dotted-video"></div>

      <div class="hero-content">
        <h1 class="hero-title">
          <span>Engineers spend <span class="hero-percent">60</span>% of</span>
          <span>their time maintaining</span>
        </h1>
        <a href="#" class="hero-cta">Start saving time</a>
      </div>

      <div class="hero-rings" aria-hidden="true">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="ring ring-4"></div>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
