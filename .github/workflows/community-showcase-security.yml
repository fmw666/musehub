name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Opt actions still declaring node20 in action.yml (e.g. actions/setup-node@v4
  # as of 2026-04) onto the node24 runtime ahead of GitHub's 2026-06-02 flip.
  # actions/checkout@v5 already ships a node24 bundle natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    name: Validate, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci
