name: Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard missing secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Vercel secrets are not configured. Skipping deploy."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        if: env.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (${{ github.event_name == 'push' && 'production' || 'preview' }})
        if: env.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build
        if: env.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy
        id: deploy
        if: env.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Summary
        if: env.skip != 'true'
        run: |
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: **${{ github.event_name == 'push' && 'production' || 'preview' }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
